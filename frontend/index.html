<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Riders Tesorería</title>
    <!-- Bootstrap 5.3 CSS (Grid only mostly, but full CDN for ease) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="app">
        <!-- Custom Toolbar -->
        <div class="toolbar d-none" id="app-nav">
            <div class="toolbar-group">
                <button class="tool-btn" onclick="showDashboard()" title="Inicio">🏠</button>
                <button class="tool-btn" onclick="goBack()" title="Volver">⬅</button>
            </div>
            <div class="toolbar-group">
                <button class="tool-btn yellow" onclick="showChangePasswordModal()" title="Cambiar Clave">🔑</button>
                <button class="tool-btn red" onclick="logout()" title="Salir">🚪</button>
            </div>
        </div>

        <!-- Main Content -->
        <main class="container-fluid" style="max-width: 1200px; margin: 0 auto;">
            <div id="loading" class="text-center text-light mt-5">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>

            <div id="content" class="d-none">
                <!-- Injected via JS -->
            </div>
        </main>

        <!-- Modals maintained... -->
        <!-- Transaction Modal -->
        <div class="modal fade" id="transactionModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content bg-dark-custom text-light">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title">Registrar Movimiento</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="transactionForm">
                            <div class="mb-3">
                                <label class="form-label">Tipo</label>
                                <select class="form-select bg-dark text-light border-secondary" id="txType"
                                    onchange="updateTxModalFields()">
                                    <option value="income">Ingreso</option>
                                    <option value="expense">Egreso</option>
                                </select>
                            </div>

                            <!-- Dynamic Logic RF-05 -->
                            <div id="originDiv" class="mb-3">
                                <label class="form-label">Origen</label>
                                <select class="form-select bg-dark text-light border-secondary" id="txOrigin"
                                    onchange="updateOriginFields()">
                                    <option value="external">Externo</option>
                                    <option value="partner">Socio</option>
                                </select>
                            </div>

                            <div id="partnerDiv" class="mb-3 d-none">
                                <label class="form-label">Socio</label>
                                <select class="form-select bg-dark text-light border-secondary" id="txPartner"
                                    onchange="updateReasonFields()">
                                    <option value="">Seleccione...</option>
                                </select>
                            </div>

                            <div id="reasonDiv" class="mb-3 d-none">
                                <label class="form-label">Motivo</label>
                                <select class="form-select bg-dark text-light border-secondary" id="txReason"
                                    onchange="updateReasonFields()">
                                    <option value="quota">Cuota</option>
                                    <option value="other">Otro</option>
                                </select>
                            </div>

                            <div id="debtDiv" class="mb-3 d-none border border-secondary p-2 rounded">
                                <small class="text-info d-block mb-2 fw-bold">Cuotas Pendientes (Seleccione para
                                    pagar):</small>
                                <div id="debtList"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Monto</label>
                                <input type="number" class="form-control bg-dark text-light border-secondary"
                                    id="txAmount" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Descripción</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary" id="txDesc"
                                    required>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary" onclick="submitTransaction()">Guardar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Create Partner Modal -->
        <div class="modal fade" id="partnerModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content bg-dark-custom text-light">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title">Registrar Socio</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="partnerForm">
                            <input type="hidden" id="partnerId"> <!-- Hidden ID -->
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary"
                                    id="partnerName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control bg-dark text-light" id="partnerEmail" required>
                            </div>
                            <!-- New Fields Phase 4 -->
                            <div class="mb-3">
                                <label class="form-label">Nick Name</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary"
                                    id="partnerNick">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="tel" class="form-control bg-dark text-light border-secondary"
                                    id="partnerPhone">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha Nacimiento</label>
                                <input type="date" class="form-control bg-dark text-light border-secondary"
                                    id="partnerBirth">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Tipo de Socio</label>
                                <select class="form-select bg-dark text-light border-secondary" id="partnerRole">
                                    <option value="partner">Socio</option>
                                    <option value="admin">Tesorero</option>
                                </select>
                            </div>
                            <!-- Password removed, auto-generated -->
                        </form>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary" onclick="submitPartner()">Crear Socio</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Change Password Modal -->
        <div class="modal fade" id="pwdModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content bg-dark-custom text-light">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title">Cambiar Contraseña</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="pwdForm">
                            <div class="mb-3">
                                <label class="form-label">Contraseña Actual</label>
                                <input type="password" class="form-control bg-dark text-light" id="currentPwd" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nueva Contraseña</label>
                                <input type="password" class="form-control bg-dark text-light" id="newPwd" required>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary" onclick="changePassword()">Actualizar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
